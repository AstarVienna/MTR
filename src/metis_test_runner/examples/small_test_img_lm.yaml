# IMAGE,LM (L/M-band imaging) example.
#
# Exercises the detector linearity + gain step (metis_lm_img_lingain / metis_det_lingain) and the master-dark
# step (metis_det_dark). metis_det_lingain fits a photon-transfer line with
# np.polyfit(deg=1, cov=True), which needs >=4 distinct DIT points below the
# linearity limit, so we provide 6 DITs, each with 2 illuminated (ON) and 2 dark
# (OFF) DETLIN frames (nObs: 2). ON/OFF split: ON = real filter "IB_4.05" (DRS.FILTER != open), OFF = filter "closed". Both ON and OFF are
# DPR.TYPE=DETLIN so they classify as DETLIN_2RG_RAW and reach the lingain task.


DETLIN_2RG_RAW_DIT1_ON:
  do.catg: DETLIN_2RG_RAW
  mode: "wcu_img_lm"
  source:
    name: empty_sky
    kwargs: {}
  properties:
    dit: 0.05
    ndit: 1
    filter_name: "IB_4.05"
    nd_filter_name: "ND_OD3"
    catg: "CALIB"
    tech: "IMAGE,LM"
    type: "DETLIN"
    tplname: "METIS_img_lm_cal_DetLin"
    nObs: 2
  wcu:
    current_lamp: "bb"
    current_fpmask: "open"
    bb_aperture: 0.5
    bb_temp: 800
    is_temp: 300
    wcu_temp: 300

DETLIN_2RG_RAW_DIT1_OFF:
  do.catg: DETLIN_2RG_RAW
  mode: "wcu_img_lm"
  source:
    name: empty_sky
    kwargs: {}
  properties:
    dit: 0.05
    ndit: 1
    filter_name: "closed"
    nd_filter_name: "ND_OD3"
    catg: "CALIB"
    tech: "IMAGE,LM"
    type: "DETLIN"
    tplname: "METIS_img_lm_cal_DetLin"
    nObs: 2
  wcu:
    current_lamp: "bb"
